name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # runs every 12 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 required for pushing to output branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: neeraj-ch7
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=cyan&color_dots=#000000,#000000,#000000,#000000,#000000
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=cyan

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
